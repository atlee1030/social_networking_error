  <meta charset="UTF-8" />

  <title>대각선 보행 SVG 테스트</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body { font-family: Inter, Pretendard, system-ui, sans-serif; background: #f5f3ef; color: #292824; }
    #stage { position: relative; width: 100%; height: 100%; }
    .guide {
      position: fixed; top: 24px; left: 24px; z-index: 5; display: flex; align-items: center; gap: 14px;
      padding: 12px 14px; border: 1px solid rgba(28,27,24,.1); border-radius: 13px;
      background: rgba(255,255,255,.82); box-shadow: 0 8px 28px rgba(35,31,24,.08); backdrop-filter: blur(12px);
    }
    .guide div { display: grid; gap: 2px; }
    .guide strong { font-size: 14px; }
    .guide span { font-size: 11px; color: #77736a; }
    button { border: 0; border-radius: 8px; padding: 8px 11px; background: #292824; color: #fff; cursor: pointer; }
    #walker { position: absolute; left: 0; top: 0; width: clamp(50px, 5.5vw, 76px); overflow: visible; transform-origin: 50% 100%; will-change: transform; }
    #walker svg { display: block; width: 100%; height: auto; overflow: visible; }
    #walker path { transform-box: view-box; will-change: transform; }
    #shadow {
      position: absolute; left: 0; top: 0; width: 38px; height: 10px; border-radius: 50%;
      background: radial-gradient(ellipse, rgba(31,28,24,.18), rgba(31,28,24,0) 70%);
      transform-origin: center; will-change: transform;
    }
    #status { position: fixed; right: 24px; bottom: 20px; font-size: 11px; color: #918d84; }
  </style>
</head>
